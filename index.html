<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Runarka · Piedras con alma</title>
    <meta name="description" content="Amuletos y pulseras de piedras naturales energéticas. Hechos a mano en la Patagonia." />

    <!-- Tema ANTES de pintar: sin esto se ve un flash blanco en cada
         navegación cuando la persona eligió modo oscuro. -->
    <script>
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem("runarka_theme") || "";
      } catch (e) {}
    </script>

    <!-- Tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Estilos (orden importa: tokens → base → componentes → layout → features) -->
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/cart.css" />
  </head>
  <body>
    <site-header></site-header>

    <main>
      <section class="section hero">
        <div class="container hero__content">
          <img class="hero__logo" src="assets/logos/logo3.png" alt="Runarka"
               onerror="this.style.display='none'" />
          <span class="eyebrow">El Lenguaje del Alma</span>
          <p class="hero__text">
            Amuletos y pulseras de piedras naturales energéticas, hechos a mano
            en la Patagonia. Cada pieza acompaña un proceso.
          </p>
          <a class="btn btn--primary" href="colecciones.html">Ver colecciones</a>
        </div>
      </section>

      <!-- TEXTO DE BIENVENIDA: se completa en el paso 4 -->
    </main>

    <site-footer></site-footer>

    <!-- El carrito llega en el paso 3: <cart-drawer></cart-drawer> -->

    <script type="module" src="js/main.js"></script>
  </body>
</html>
