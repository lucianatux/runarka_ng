<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contacto · Runarka</title>
    <meta name="description" content="Escribinos y coordinamos tu pedido. Pago en efectivo o transferencia." />

    <!-- Tema ANTES de pintar: sin esto se ve un flash blanco en cada
         navegación cuando la persona eligió modo oscuro. -->
    <script>
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem("runarka_theme") || "";
      } catch (e) {}
    </script>

    <!-- Tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Estilos (orden importa: tokens → base → componentes → layout → features) -->
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/cart.css" />
  </head>
  <body>
    <site-header></site-header>

    <main>
      <section class="section">
        <div class="container">
          <div class="section__head">
            <div class="rune-divider">ᚱ</div>
            <h1>Contacto</h1>
            <p class="muted">
              Escribinos y coordinamos tu pedido. Pago en efectivo o transferencia.
            </p>
          </div>

          <div class="contact">
            <div class="contact__links">
              <a class="btn btn--primary" id="contacto-wa" href="#"
                 target="_blank" rel="noopener">Escribir por WhatsApp</a>
              <a class="btn btn--ghost" href="https://www.instagram.com/runarka_ng/"
                 target="_blank" rel="noopener">Instagram</a>
            </div>
          </div>

          <!-- BIO DE NATALIA: se completa en el paso 4 -->
        </div>
      </section>
    </main>

    <site-footer></site-footer>

    <!-- El carrito llega en el paso 3: <cart-drawer></cart-drawer> -->

    <script type="module" src="js/main.js"></script>
  </body>
</html>
